server.port=8080
spring.application.name=api-gateway

spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=6379

spring.cloud.gateway.routes[0].id=core-service
spring.cloud.gateway.routes[0].uri=${MEDICAL_URL:http://localhost:7070}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/**
spring.cloud.gateway.routes[0].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.replenishRate=20
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.burstCapacity=40
spring.cloud.gateway.routes[0].filters[0].args.key-resolver=#{@ipKeyResolver}

spring.cloud.gateway.routes[1].id=payment-service
spring.cloud.gateway.routes[1].uri=${PAYMENT_URL:http://localhost:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/payments/**,/api/webhook/**
spring.cloud.gateway.routes[1].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[1].filters[0].args.redis-rate-limiter.replenishRate=10
spring.cloud.gateway.routes[1].filters[0].args.redis-rate-limiter.burstCapacity=20
spring.cloud.gateway.routes[1].filters[0].args.key-resolver=#{@ipKeyResolver}

spring.cloud.compatibility-verifier.enabled=false

jwt.secret=${JWT_KEY}
jwt.expiration-ms=900000

management.endpoints.web.exposure.include=health,gateway
management.endpoint.gateway.enabled=true
