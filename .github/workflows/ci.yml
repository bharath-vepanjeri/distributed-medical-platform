name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build & Test medical-service
        run: cd medical-service && mvn clean package
      - name: Build payment-service
        run: cd payment-service && mvn clean package -DskipTests
      - name: Build api-gateway
        run: cd api-gateway && mvn clean package -DskipTests
      - name: Build notification-service
        run: cd notification-service && mvn clean package -DskipTests
